; ============================================================
;  城市公园环境监测系统 — 中心节点 (ESP32-S3)
;  PlatformIO 配置 (VS Code)
; ============================================================

[env:esp32dev]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

lib_deps =
    file://../common/TFT_eSPI
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -D USER_SETUP_LOADED=1
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -I ../common
    ; --- TFT_eSPI: ST7735 1.44寸 128×128 SPI ---
    -D ST7735_DRIVER
    -D ST7735_REDTAB128
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=128
    -D TFT_CS=5
    -D TFT_DC=4
    -D TFT_RST=21
    -D TFT_MOSI=17
    -D TFT_SCLK=18
    -D TFT_BL=-1
    -D TFT_MISO=-1
    -D SPI_FREQUENCY=10000000
    -D SPI_READ_FREQUENCY=8000000
    -D TOUCH_CS=-1
    ; --- 字体加载 (❗必须: 用 USER_SETUP_LOADED 时不加会导致文字不显示/黑屏) ---
    -D LOAD_GLCD       ; Font 1: 6x8 等宽字体
    -D LOAD_FONT2      ; Font 2: 16px 字体 (draw_display 主用)
    -D LOAD_FONT4      ; Font 4: 26px 字体
    -D LOAD_FONT6      ; Font 6: 48px 数字字体
    -D LOAD_FONT7      ; Font 7: 7段数码管字体
    -D LOAD_FONT8      ; Font 8: 75px 数字字体
    -D LOAD_GFXFF      ; FreeFonts 支持
    -D SMOOTH_FONT     ; 抗锯齿平滑字体
    ; --- 禁用库内部 #warnings ---
    -D DISABLE_ALL_LIBRARY_WARNINGS
