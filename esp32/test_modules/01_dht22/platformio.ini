; DHT22 温湿度传感器测试
[env:esp32dev]
platform        = espressif32
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200
monitor_dtr     = 1
monitor_rts     = 1
upload_speed    = 921600
board_build.flash_mode = qio
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
